<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Resource Hub - Register</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <h1 class="logo">Student Resource Hub</h1>
        <nav class="main-nav">
          <div class="nav-label">Main</div>
          <a href="index.html">Home</a>
          <a href="about.html">About</a>
          <div class="nav-label">Resources</div>
          <a href="index.html" class="sub-link">Textbooks</a>
          <a href="index.html" class="sub-link">Mental Health</a>
          <a href="index.html" class="sub-link">Tech Support</a>
          <a href="index.html" class="sub-link">Career Services</a>
          <div class="nav-label">Account</div>
          <a href="login.html">Login</a>
          <a href="register.html">Register</a>
          <a href="add.html">Add Resources</a>
        </nav>
      </aside>

      <main class="site-main">
        <section class="login">
          <div class="container">
            <h2>Create an Account</h2>

            <form class="login-form" id="register-form" action="register.php" method="POST">
              <div id="form-message" class="form-message" role="alert"></div>

              <label for="name">
                Name
                <input id="name" type="text" name="name" placeholder="Your name" required />
              </label>

              <label for="email">
                Email
                <input id="email" type="email" name="email" placeholder="you@example.com" required />
              </label>

              <label for="password">
                Password
                <input id="password" type="password" name="password" placeholder="Min. 8 characters" required />
              </label>

              <label for="confirm_password">
                Confirm Password
                <input id="confirm_password" type="password" name="confirm_password" placeholder="Re-enter password" required />
              </label>

              <button type="submit" class="button primary">Create Account</button>

              <p class="form-link">
                Already have an account? <a href="login.html">Login</a>
              </p>
            </form>
          </div>
        </section>
      </main>
    </div>

    <footer class="site-footer">
      <div class="container">
        <p>&copy; 2026 Student Resource Hub</p>
      </div>
    </footer>

    <script src="auth.js"></script>
  </body>
</html>
